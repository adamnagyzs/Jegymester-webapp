{% extends "base.html" %}

{% block title %}Kijelentkezés - Cinema{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark text-center">
                <h3 class="mb-0"><i class="bi bi-box-arrow-right"></i> Kijelentkezés</h3>
            </div>
            <div class="card-body p-4 text-center">
                <p class="mb-4">Biztosan ki szeretnél jelentkezni?</p>
                
                <form method="POST" action="{% url 'account_logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-warning btn-lg w-100">
                        <i class="bi bi-box-arrow-right"></i> Kijelentkezés
                    </button>
                </form>
            </div>
            <div class="card-footer text-center text-muted">
                <a href="{% url 'core:home' %}">Vissza a főoldalra</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
