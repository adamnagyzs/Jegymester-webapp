{% extends "base.html" %}

{% block title %}E-mail elküldve - Cinema{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-success text-white text-center">
                <h3 class="mb-0"><i class="bi bi-envelope-check"></i> E-mail elküldve</h3>
            </div>
            <div class="card-body p-4 text-center">
                <i class="bi bi-check-circle text-success" style="font-size: 3rem;"></i>
                <p class="mt-3">
                    Ha létezik fiók a megadott e-mail címmel, küldtünk egy linket a jelszó visszaállításához. 
                    Kérjük, ellenőrizd a postaládádat.
                </p>
            </div>
            <div class="card-footer text-center text-muted">
                <a href="{% url 'account_login' %}">Vissza a bejelentkezéshez</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
