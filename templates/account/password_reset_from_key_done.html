{% extends "base.html" %}

{% block title %}Jelszó sikeresen módosítva - Cinema{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-success text-white text-center">
                <h3 class="mb-0"><i class="bi bi-check-circle"></i> Jelszó módosítva!</h3>
            </div>
            <div class="card-body p-4 text-center">
                <i class="bi bi-shield-check text-success" style="font-size: 4rem;"></i>
                <h4 class="mt-3 text-success">Sikeresen beállítottad az új jelszavad!</h4>
                <p class="text-muted mt-2">
                    Most már bejelentkezhetsz az új jelszavaddal.
                </p>
                <a href="{% url 'account_login' %}" class="btn btn-success btn-lg w-100 mt-3">
                    <i class="bi bi-box-arrow-in-right"></i> Bejelentkezés
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
